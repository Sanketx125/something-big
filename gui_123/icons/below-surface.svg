  <line x1="5" y1="9" x2="3.5" y2="6" stroke="currentColor" stroke-width="1.1" stroke-linecap="round" stroke-opacity="0.35"/>
  <line x1="10" y1="8" x2="8.5" y2="5" stroke="currentColor" stroke-width="1.1" stroke-linecap="round" stroke-opacity="0.35"/>
  <line x1="15.5" y1="8.5" x2="14" y2="5.5" stroke="currentColor" stroke-width="1.1" stroke-linecap="round" stroke-opacity="0.35"/>
  <line x1="20.5" y1="7.5" x2="19" y2="4.5" stroke="currentColor" stroke-width="1.1" stroke-linecap="round" stroke-opacity="0.35"/>
  <!-- Points BELOW the surface (filled bold dots, clearly under the line) -->
  <circle cx="7" cy="14" r="1.6" fill="currentColor"/>
  <circle cx="12" cy="16.5" r="1.6" fill="currentColor"/>
  <circle cx="17" cy="13.5" r="1.6" fill="currentColor"/>
