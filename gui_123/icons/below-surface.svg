<svg width="24" height="24" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Surface plane (wavy/terrain line) -->
  <path d="M2.5 9.5C5 9.5 6 7 8.5 7C11 7 11.5 10 14 10C16.5 10 17 7.5 19.5 7.5L21.5 7.5" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/>
