<svg width="24" height="24" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Keyboard key body -->
  <rect x="2.75" y="4.75" width="14" height="11" rx="2.5" fill="currentColor" fill-opacity="0.1" stroke="currentColor" stroke-width="1.5"/>
  <!-- Key cap inner shadow (raised key feel) -->
  <rect x="4.5" y="6.5" width="10.5" height="7.5" rx="1.5" fill="currentColor" fill-opacity="0.07" stroke="currentColor" stroke-width="1" stroke-opacity="0.4"/>
  <!-- Key symbol (command-like) -->
  <path d="M7.5 10.5H12" stroke="currentColor" stroke-width="1.3" stroke-linecap="round" stroke-opacity="0.6"/>
  <path d="M9.75 8.5V12.5" stroke="currentColor" stroke-width="1.3" stroke-linecap="round" stroke-opacity="0.6"/>
  <!-- Gear badge (bottom right) -->
  <circle cx="18.5" cy="18.5" r="5.5" fill="currentColor"/>
  <!-- Gear teeth (8-point) -->
  <circle cx="18.5" cy="18.5" r="2" stroke="white" stroke-width="1.3"/>
  <line x1="18.5" y1="14.5" x2="18.5" y2="16" stroke="white" stroke-width="1.3" stroke-linecap="round"/>
  <line x1="18.5" y1="21" x2="18.5" y2="22.5" stroke="white" stroke-width="1.3" stroke-linecap="round"/>
  <line x1="14.5" y1="18.5" x2="16" y2="18.5" stroke="white" stroke-width="1.3" stroke-linecap="round"/>
  <line x1="21" y1="18.5" x2="22.5" y2="18.5" stroke="white" stroke-width="1.3" stroke-linecap="round"/>
  <line x1="15.67" y1="15.67" x2="16.77" y2="16.77" stroke="white" stroke-width="1.3" stroke-linecap="round"/>
  <line x1="20.23" y1="20.23" x2="21.33" y2="21.33" stroke="white" stroke-width="1.3" stroke-linecap="round"/>
  <line x1="21.33" y1="15.67" x2="20.23" y2="16.77" stroke="white" stroke-width="1.3" stroke-linecap="round"/>
  <line x1="16.77" y1="20.23" x2="15.67" y2="21.33" stroke="white" stroke-width="1.3" stroke-linecap="round"/>
</svg>
