<svg width="24" height="24" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Bezier curve -->
  <path d="M3.5 19C3.5 19 7 4 12 12C17 20 20.5 5 20.5 5" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/>
  <!-- Control handle lines (tangent lines) -->
  <line x1="3.5" y1="19" x2="7" y2="10" stroke="currentColor" stroke-width="1" stroke-linecap="round" stroke-opacity="0.4" stroke-dasharray="2 2"/>
  <line x1="20.5" y1="5" x2="17" y2="14" stroke="currentColor" stroke-width="1" stroke-linecap="round" stroke-opacity="0.4" stroke-dasharray="2 2"/>
  <!-- Anchor points -->
  <circle cx="3.5" cy="19" r="1.75" fill="currentColor"/>
  <circle cx="20.5" cy="5" r="1.75" fill="currentColor"/>
  <!-- Control handle points (hollow) -->
  <circle cx="7" cy="10" r="1.5" fill="currentColor" fill-opacity="0.1" stroke="currentColor" stroke-width="1.2"/>
  <circle cx="17" cy="14" r="1.5" fill="currentColor" fill-opacity="0.1" stroke="currentColor" stroke-width="1.2"/>
</svg>
