<svg width="24" height="24" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
  <style>
    .vp-fill { fill: #F8F8F8; }
    .vp-line { stroke: #CCCCCC; }

    @media (prefers-color-scheme: dark) {
      .vp-fill { fill: #111318; }
      .vp-line { stroke: #2A2A35; }
    }
  </style>
  <defs>
    <!-- Intensity gradient: dark → purple → red → amber → white -->
    <linearGradient id="intensity" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%"   stop-color="#111318"/>
      <stop offset="35%"  stop-color="#534AB7"/>
      <stop offset="60%"  stop-color="#E24B4A"/>
      <stop offset="80%"  stop-color="#EF9F27"/>
      <stop offset="100%" stop-color="#FFFFFF"/>
    </linearGradient>
  </defs>

  <!-- Viewport frame -->
  <rect x="2" y="2" width="20" height="20" rx="2.5"
        class="vp-fill vp-line" stroke-width="0.8"/>

  <!-- Point cloud dots — low intensity (dark/black) left → high intensity (white) right -->
  <circle cx="4.5"  cy="14" r="0.85" fill="#2C2C2A"/>
  <circle cx="5.5"  cy="10" r="0.85" fill="#2C2C2A"/>
  <circle cx="6.5"  cy="16" r="0.80" fill="#3C3489"/>
  <circle cx="7.5"  cy="11" r="0.85" fill="#534AB7"/>
  <circle cx="8.5"  cy="15" r="0.85" fill="#7F77DD"/>
  <circle cx="9.5"  cy="9"  r="0.85" fill="#A32D2D"/>
  <circle cx="10.5" cy="14" r="0.85" fill="#E24B4A"/>
  <circle cx="11.5" cy="10" r="0.85" fill="#E24B4A"/>
  <circle cx="12.5" cy="16" r="0.85" fill="#EF9F27"/>
  <circle cx="13.5" cy="11" r="0.85" fill="#EF9F27"/>
  <circle cx="14.5" cy="15" r="0.85" fill="#FAC775"/>
  <circle cx="15.5" cy="9"  r="0.85" fill="#FAC775"/>
  <circle cx="16.5" cy="14" r="0.85" fill="#FFFFFF" opacity="0.95"/>
  <circle cx="17.5" cy="10" r="0.85" fill="#FFFFFF" opacity="0.95"/>
  <circle cx="18.5" cy="16" r="0.80" fill="#FFFFFF" opacity="0.95"/>

  <!-- Intensity ramp bar at bottom -->
  <rect x="3" y="19.5" width="18" height="2" rx="1"
        fill="url(#intensity)"/>
</svg>
