<svg width="24" height="24" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Background scatter (faint, representing normal point cloud) -->
  <circle cx="4" cy="8" r="1.1" fill="currentColor" fill-opacity="0.25"/>
  <circle cx="8" cy="6" r="1.1" fill="currentColor" fill-opacity="0.25"/>
  <circle cx="6" cy="14" r="1.1" fill="currentColor" fill-opacity="0.25"/>
  <circle cx="3.5" cy="17" r="1.1" fill="currentColor" fill-opacity="0.25"/>
  <circle cx="20" cy="7" r="1.1" fill="currentColor" fill-opacity="0.25"/>
  <circle cx="19" cy="16" r="1.1" fill="currentColor" fill-opacity="0.25"/>
  <!-- Isolation circle (dashed, around the outlier) -->
  <circle cx="13" cy="12.5" r="5.5" stroke="currentColor" stroke-width="1.4" stroke-dasharray="3 2" stroke-linecap="round"/>
  <!-- The isolated point (bold, centered in circle) -->
  <circle cx="13" cy="12.5" r="2" fill="currentColor"/>
</svg>
