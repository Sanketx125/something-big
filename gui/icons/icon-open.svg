<svg width="24" height="24" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
  <style>
    .folder-fill { fill: #E6F1FB; }
    .folder-line { stroke: #185FA5; }
    .arrow       { stroke: #185FA5; }

    @media (prefers-color-scheme: dark) {
      .folder-fill { fill: #0C447C; }
      .folder-line { stroke: #378ADD; }
      .arrow       { stroke: #85B7EB; }
    }
  </style>

  <!-- Folder body -->
  <path d="M2 6C2 4.895 2.895 4 4 4H9L11 6H20C21.105 6 22 6.895 22 8V18C22 19.105 21.105 20 20 20H4C2.895 20 2 19.105 2 18V6Z"
        class="folder-fill folder-line" stroke-width="1" stroke-linejoin="round"/>

  <!-- Open lid line -->
  <path d="M2 10H22" class="folder-line" stroke-width="1" stroke-linecap="round"/>

  <!-- Arrow shaft pointing up (lifting file out) -->
  <line x1="12" y1="15" x2="12" y2="10"
        class="arrow" stroke-width="1.5" stroke-linecap="round"/>

  <!-- Arrow head pointing up -->
  <polyline points="9,13 12,10 15,13"
            fill="none" class="arrow"
            stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
</svg>
