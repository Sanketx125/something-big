<svg width="24" height="24" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
  <style>
    .cloud     { fill: #185FA5; }
    .info-fill { fill: #E6F1FB; }
    .info-line { stroke: #185FA5; }
    .info-sym  { fill: #185FA5; stroke: #185FA5; }
    @media (prefers-color-scheme: dark) {
      .cloud     { fill: #0C447C; }
      .info-fill { fill: #0C447C; }
      .info-line { stroke: #378ADD; }
      .info-sym  { fill: #85B7EB; stroke: #85B7EB; }
    }
  </style>
  <circle cx="9"  cy="8"  r="0.8" class="cloud" opacity="0.35"/>
  <circle cx="14" cy="10" r="0.8" class="cloud" opacity="0.35"/>
  <circle cx="7"  cy="14" r="0.8" class="cloud" opacity="0.35"/>
  <circle cx="15" cy="15" r="6" class="info-fill info-line" stroke-width="1"/>
  <circle cx="15" cy="12" r="0.9" class="info-sym"/>
  <line x1="15" y1="14" x2="15" y2="19" class="info-sym" stroke-width="1.4" stroke-linecap="round"/>
</svg>
