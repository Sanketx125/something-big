      .label { fill: #FAC775; }
    }
  </style>
  <circle cx="8"  cy="6"  r="0.8" class="cloud" opacity="0.35"/>
  <circle cx="14" cy="8"  r="0.8" class="cloud" opacity="0.35"/>
  <circle cx="10" cy="12" r="0.8" class="cloud" opacity="0.35"/>
  <circle cx="15" cy="15" r="0.8" class="cloud" opacity="0.35"/>
  <line x1="4" y1="5"  x2="12" y2="5"  class="dim" stroke-width="1.1" stroke-linecap="round"/>
  <line x1="4" y1="19" x2="12" y2="19" class="dim" stroke-width="1.1" stroke-linecap="round"/>
  <line x1="8" y1="5"  x2="8"  y2="19" class="dim" stroke-width="1.2" stroke-linecap="round"/>
  <polyline points="6,8 8,5 10,8"    fill="none" class="dim" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"/>
  <polyline points="6,16 8,19 10,16" fill="none" class="dim" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"/>
  <text x="17" y="13" text-anchor="middle" dominant-baseline="central"
