<svg width="24" height="24" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
  <style>
    .bg         { fill: #E6F1FB; }
    .border     { stroke: #185FA5; }
    .grid       { stroke: #185FA5; }
    .crosshair  { stroke: #185FA5; }
    .dot        { fill: #185FA5; }

    @media (prefers-color-scheme: dark) {
      .bg        { fill: #0C447C; }
      .border    { stroke: #378ADD; }
      .grid      { stroke: #85B7EB; }
      .crosshair { stroke: #85B7EB; }
      .dot       { fill: #85B7EB; }
    }
  </style>

  <!-- Plan view bounding box -->
  <rect x="3" y="3" width="18" height="18" rx="1.5"
        class="bg border" stroke-width="1"/>

  <!-- Grid lines horizontal -->
  <line x1="3"  y1="9"  x2="21" y2="9"  class="grid" stroke-width="0.5" opacity="0.35"/>
  <line x1="3"  y1="15" x2="21" y2="15" class="grid" stroke-width="0.5" opacity="0.35"/>

  <!-- Grid lines vertical -->
  <line x1="9"  y1="3"  x2="9"  y2="21" class="grid" stroke-width="0.5" opacity="0.35"/>
  <line x1="15" y1="3"  x2="15" y2="21" class="grid" stroke-width="0.5" opacity="0.35"/>

  <!-- Center crosshair axis ticks -->
  <line x1="12" y1="3"    x2="12" y2="5.5"  class="crosshair" stroke-width="1.2" stroke-linecap="round"/>
  <line x1="12" y1="18.5" x2="12" y2="21"   class="crosshair" stroke-width="1.2" stroke-linecap="round"/>
  <line x1="3"    y1="12" x2="5.5"  y2="12" class="crosshair" stroke-width="1.2" stroke-linecap="round"/>
  <line x1="18.5" y1="12" x2="21"   y2="12" class="crosshair" stroke-width="1.2" stroke-linecap="round"/>

  <!-- Viewpoint target ring -->
  <circle cx="12" cy="12" r="3.5" fill="none" class="crosshair" stroke-width="1.2"/>

  <!-- Center dot -->
  <circle cx="12" cy="12" r="1.2" class="dot"/>
</svg>
