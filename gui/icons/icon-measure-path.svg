    @media (prefers-color-scheme: dark) {
      .cloud { fill: #0C447C; }
      .dim   { stroke: #FAC775; }
      .dot   { fill: #FAC775; }
    }
  </style>
  <circle cx="4"  cy="14" r="0.8" class="cloud" opacity="0.35"/>
  <circle cx="9"  cy="8"  r="0.8" class="cloud" opacity="0.35"/>
  <circle cx="15" cy="13" r="0.8" class="cloud" opacity="0.35"/>
  <circle cx="19" cy="7"  r="0.8" class="cloud" opacity="0.35"/>
  <polyline points="5,18 9,9 15,14 20,8" fill="none" class="dim" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/>
  <circle cx="5"  cy="18" r="1.3" class="dot"/>
  <circle cx="9"  cy="9"  r="1.1" class="dot" opacity="0.8"/>
