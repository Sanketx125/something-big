<svg width="64" height="72" viewBox="0 0 40 46" fill="none" xmlns="http://www.w3.org/2000/svg">
  <style>
    .doc  { fill:#FFFFFF; stroke:#D4D4D4; }
    .fold { fill:#EBEBEB; stroke:#D4D4D4; }
    .dot1 { fill:#378ADD; }
    .dot2 { fill:#185FA5; }
    .dot3 { fill:#0C447C; }
    .band { fill:#185FA5; }
    .txt  { fill:#FFFFFF; }
    @media(prefers-color-scheme:dark){
      .doc  { fill:#1A2235; stroke:#2A3550; }
      .fold { fill:#222E46; stroke:#2A3550; }
      .dot1 { fill:#85B7EB; }
      .dot2 { fill:#85B7EB; }
      .dot3 { fill:#B5D4F4; }
      .band { fill:#378ADD; }
      .txt  { fill:#FFFFFF; }
    }
  </style>
  <rect x="1.5" y="1.5" width="37" height="43" rx="4" class="doc" stroke-width="1"/>
  <path d="M27 1.5 L38.5 13 H28a1 1 0 0 1-1-1Z" class="fold" stroke-width=".8"/>
  <!-- LiDAR point cloud dots -->
  <circle cx="9"  cy="11" r="1.2" class="dot1" opacity=".40"/>
  <circle cx="14" cy="9"  r="1.5" class="dot2" opacity=".45"/>
  <circle cx="20" cy="12" r="1.1" class="dot1" opacity=".35"/>
  <circle cx="10" cy="16" r="1.3" class="dot2" opacity=".40"/>
  <circle cx="17" cy="15" r="1.2" class="dot1" opacity=".40"/>
  <circle cx="24" cy="10" r="1.0" class="dot3" opacity=".35"/>
  <circle cx="7"  cy="19" r="1.0" class="dot2" opacity=".30"/>
  <circle cx="14" cy="20" r="1.2" class="dot1" opacity=".35"/>
  <circle cx="22" cy="18" r="1.0" class="dot2" opacity=".30"/>
  <!-- Bold color band bottom -->
  <path d="M1.5 29H38.5V42a3.5 3.5 0 0 1-3.5 3.5H5A3.5 3.5 0 0 1 1.5 42Z" class="band"/>
  <!-- Large white label -->
  <text x="20" y="38.5" text-anchor="middle" dominant-baseline="central"
        font-family="Arial Black,Arial,Helvetica,sans-serif"
        font-size="11.5" font-weight="900" class="txt" letter-spacing="1.2">SNT</text>
</svg>
