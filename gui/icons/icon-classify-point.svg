<svg width="24" height="24" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
  <style>
    .cloud-back  { fill: #185FA5; }
    .sel-ring    { fill: #534AB7; }
    .cross       { stroke: #534AB7; }
    .cursor      { stroke: #444441; }
    @media (prefers-color-scheme: dark) {
      .cloud-back  { fill: #0C447C; }
      .sel-ring    { fill: #AFA9EC; }
      .cross       { stroke: #AFA9EC; }
      .cursor      { stroke: #D3D1C7; }
    }
  </style>
  <circle cx="5"  cy="8"  r="0.75" class="cloud-back" opacity="0.35"/>
  <circle cx="9"  cy="6"  r="0.75" class="cloud-back" opacity="0.35"/>
  <circle cx="14" cy="7"  r="0.75" class="cloud-back" opacity="0.35"/>
  <circle cx="18" cy="9"  r="0.75" class="cloud-back" opacity="0.35"/>
  <circle cx="6"  cy="14" r="0.75" class="cloud-back" opacity="0.35"/>
  <circle cx="11" cy="16" r="0.75" class="cloud-back" opacity="0.35"/>
  <circle cx="16" cy="15" r="0.75" class="cloud-back" opacity="0.35"/>
  <circle cx="19" cy="13" r="0.75" class="cloud-back" opacity="0.35"/>
  <!-- selection halo -->
  <circle cx="12" cy="11" r="3.5" class="sel-ring" opacity="0.15"/>
  <!-- selected point -->
  <circle cx="12" cy="11" r="2"   class="sel-ring" opacity="0.9"/>
  <!-- crosshair -->
  <line x1="12" y1="6"    x2="12" y2="8.5"  class="cross" stroke-width="0.9" stroke-linecap="round" opacity="0.7"/>
  <line x1="12" y1="13.5" x2="12" y2="16"   class="cross" stroke-width="0.9" stroke-linecap="round" opacity="0.7"/>
  <line x1="6.5" y1="11"  x2="9"  y2="11"   class="cross" stroke-width="0.9" stroke-linecap="round" opacity="0.7"/>
  <line x1="15"  y1="11"  x2="17.5" y2="11" class="cross" stroke-width="0.9" stroke-linecap="round" opacity="0.7"/>
  <!-- cursor pointer diagonal -->
  <line x1="15" y1="15" x2="20" y2="20" class="cursor" stroke-width="1.3" stroke-linecap="round"/>
</svg>
