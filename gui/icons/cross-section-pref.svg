<svg width="24" height="24" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Left block (cross section shape) -->
  <rect x="2.75" y="5.75" width="7.5" height="12.5" rx="2" fill="currentColor" fill-opacity="0.1" stroke="currentColor" stroke-width="1.5"/>
  <!-- Cut plane -->
  <line x1="11.25" y1="3.5" x2="11.25" y2="20.5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-dasharray="3 2"/>
  <!-- Hatch lines on cut face -->
  <line x1="10.25" y1="7" x2="7" y2="10.25" stroke="currentColor" stroke-width="0.9" stroke-linecap="round" stroke-opacity="0.4"/>
  <line x1="10.25" y1="10.5" x2="5.5" y2="15.25" stroke="currentColor" stroke-width="0.9" stroke-linecap="round" stroke-opacity="0.4"/>
  <line x1="10.25" y1="14" x2="8" y2="16.25" stroke="currentColor" stroke-width="0.9" stroke-linecap="round" stroke-opacity="0.4"/>
  <!-- Settings panel (right side) -->
  <rect x="13.25" y="5.75" width="8" height="12.5" rx="2" fill="currentColor" fill-opacity="0.08" stroke="currentColor" stroke-width="1.5"/>
  <!-- Settings rows inside panel -->
  <line x1="15" y1="9" x2="19.5" y2="9" stroke="currentColor" stroke-width="1.1" stroke-linecap="round" stroke-opacity="0.5"/>
  <circle cx="16.5" cy="12" r="1.1" fill="currentColor" fill-opacity="0.55"/>
  <line x1="18" y1="12" x2="19.5" y2="12" stroke="currentColor" stroke-width="1.1" stroke-linecap="round" stroke-opacity="0.4"/>
  <line x1="15" y1="15" x2="18" y2="15" stroke="currentColor" stroke-width="1.1" stroke-linecap="round" stroke-opacity="0.35"/>
</svg>
