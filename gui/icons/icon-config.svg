<svg width="24" height="24" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
  <style>
    .gear-fill  { fill: #E6F1FB; }
    .gear-line  { stroke: #185FA5; }
    .hole-fill  { fill: #F0F2F5; }
    .key-line   { stroke: #185FA5; }

    @media (prefers-color-scheme: dark) {
      .gear-fill  { fill: #0C447C; }
      .gear-line  { stroke: #378ADD; }
      .hole-fill  { fill: #111318; }
      .key-line   { stroke: #85B7EB; }
    }
  </style>

  <!-- Gear outer shape — 12-point cog -->
  <path d="M12 2.5
    L13.5 4.2 L15.6 3.7 L16.6 5.6 L18.7 5.9
    L18.7 8.1 L20.5 9.3 L19.5 11.3
    L20.5 13.3 L18.7 14.5 L18.7 16.7 L16.6 17
    L15.6 18.9 L13.5 18.4 L12 20.1
    L10.5 18.4 L8.4 18.9 L7.4 17
    L5.3 16.7 L5.3 14.5 L3.5 13.3 L4.5 11.3
    L3.5 9.3 L5.3 8.1 L5.3 5.9 L7.4 5.6
    L8.4 3.7 L10.5 4.2 Z"
    class="gear-fill gear-line" stroke-width="0.9" stroke-linejoin="round"/>

  <!-- Center hole -->
  <circle cx="12" cy="11.3" r="3.2"
          class="hole-fill gear-line" stroke-width="0.9"/>

  <!-- Keyboard shortcut ⌘ symbol inside hole -->
  <path d="M10.5 10   Q10.5 9 11.5 9   Q12.5 9   12.5 10
           L12.5 12.6 Q12.5 13.6 11.5 13.6 Q10.5 13.6 10.5 12.6
           Q10.5 11.6 11.5 11.6 L14.1 11.6
           Q15.1 11.6 15.1 12.6 Q15.1 13.6 14.1 13.6 Q13.1 13.6 13.1 12.6
           L13.1 10   Q13.1 9 14.1 9   Q15.1 9   15.1 10
           Q15.1 11 14.1 11 L11.5 11
           Q10.5 11 10.5 10Z"
        fill="none" class="key-line"
        stroke-width="0.75" stroke-linecap="round" stroke-linejoin="round"/>
</svg>
