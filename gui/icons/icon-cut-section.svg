<svg width="24" height="24" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
  <style>
    /* Points outside slab — clipped/muted */
    .cloud-out  { fill: #B5D4F4; }
    /* Points inside slab — active/full color */
    .cloud-in   { fill: #185FA5; }
    /* Slab walls + bracket arrows */
    .slab-line  { stroke: #EF9F27; }
    /* Slab fill tint */
    .slab-fill  { fill: #EF9F27; }

    @media (prefers-color-scheme: dark) {
      .cloud-out  { fill: #042C53; }
      .cloud-in   { fill: #85B7EB; }
      .slab-line  { stroke: #FAC775; }
      .slab-fill  { fill: #FAC775; }
    }
  </style>

  <!-- Outside points — left of slab (clipped, muted) -->
  <circle cx="3.5" cy="7"  r="0.8" class="cloud-out" opacity="0.5"/>
  <circle cx="3.5" cy="12" r="0.8" class="cloud-out" opacity="0.5"/>
  <circle cx="3.5" cy="17" r="0.8" class="cloud-out" opacity="0.5"/>

  <!-- Outside points — right of slab (clipped, muted) -->
  <circle cx="20.5" cy="7"  r="0.8" class="cloud-out" opacity="0.5"/>
  <circle cx="20.5" cy="12" r="0.8" class="cloud-out" opacity="0.5"/>
  <circle cx="20.5" cy="17" r="0.8" class="cloud-out" opacity="0.5"/>

  <!-- Slab fill tint -->
  <rect x="8" y="2" width="8" height="20" class="slab-fill" opacity="0.1"/>

  <!-- Slab left wall -->
  <line x1="8" y1="2" x2="8" y2="22"
        class="slab-line" stroke-width="1.4" stroke-linecap="round"/>

  <!-- Slab right wall -->
  <line x1="16" y1="2" x2="16" y2="22"
        class="slab-line" stroke-width="1.4" stroke-linecap="round"/>

  <!-- Bracket arrows — left wall top + bottom -->
  <polyline points="6,4.5 8,2.5 10,4.5"
            fill="none" class="slab-line"
            stroke-width="1.1" stroke-linecap="round" stroke-linejoin="round"/>
  <polyline points="6,19.5 8,21.5 10,19.5"
            fill="none" class="slab-line"
            stroke-width="1.1" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Bracket arrows — right wall top + bottom -->
  <polyline points="14,4.5 16,2.5 18,4.5"
            fill="none" class="slab-line"
            stroke-width="1.1" stroke-linecap="round" stroke-linejoin="round"/>
  <polyline points="14,19.5 16,21.5 18,19.5"
            fill="none" class="slab-line"
            stroke-width="1.1" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Inside points — active, full color -->
  <circle cx="10.5" cy="6"  r="0.9" class="cloud-in" opacity="0.9"/>
  <circle cx="13.5" cy="5"  r="0.9" class="cloud-in" opacity="0.9"/>
  <circle cx="10.5" cy="10" r="0.9" class="cloud-in" opacity="0.9"/>
  <circle cx="13.5" cy="11" r="0.9" class="cloud-in" opacity="0.85"/>
  <circle cx="10.5" cy="15" r="0.9" class="cloud-in" opacity="0.9"/>
  <circle cx="13.5" cy="16" r="0.9" class="cloud-in" opacity="0.9"/>
  <circle cx="11"   cy="19" r="0.9" class="cloud-in" opacity="0.9"/>
  <circle cx="14"   cy="20" r="0.9" class="cloud-in" opacity="0.85"/>
</svg>
