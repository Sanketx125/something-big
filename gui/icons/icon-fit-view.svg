<svg width="24" height="24" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
  <style>
    .frame { stroke: #185FA5; }
    .cloud { fill: #185FA5; }
    .arrow { stroke: #185FA5; }

    @media (prefers-color-scheme: dark) {
      .frame { stroke: #85B7EB; }
      .cloud { fill: #85B7EB; }
      .arrow { stroke: #85B7EB; }
    }
  </style>

  <!-- Viewport corner brackets — the target frame to fit into -->
  <path d="M3 7V3H7"     class="frame" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round"/>
  <path d="M17 3H21V7"   class="frame" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round"/>
  <path d="M21 17V21H17" class="frame" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round"/>
  <path d="M7 21H3V17"   class="frame" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Point cloud cluster — center -->
  <circle cx="10" cy="10" r="0.9" class="cloud" opacity="0.50"/>
  <circle cx="13" cy="9"  r="0.9" class="cloud" opacity="0.60"/>
  <circle cx="11" cy="12" r="0.9" class="cloud" opacity="0.55"/>
  <circle cx="14" cy="12" r="0.9" class="cloud" opacity="0.50"/>
  <circle cx="9"  cy="13" r="0.9" class="cloud" opacity="0.45"/>
  <circle cx="15" cy="10" r="0.9" class="cloud" opacity="0.50"/>
  <circle cx="12" cy="14" r="0.9" class="cloud" opacity="0.55"/>

  <!-- Arrows expanding outward to each corner -->
  <!-- top-left -->
  <line x1="10" y1="10" x2="5.5" y2="5.5"  class="arrow" stroke-width="1.1" stroke-linecap="round"/>
  <polyline points="7,5 5.5,5.5 6,7"        fill="none" class="arrow" stroke-width="1.1" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- top-right -->
  <line x1="14" y1="10" x2="18.5" y2="5.5" class="arrow" stroke-width="1.1" stroke-linecap="round"/>
  <polyline points="17,5 18.5,5.5 18,7"     fill="none" class="arrow" stroke-width="1.1" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- bottom-left -->
  <line x1="10" y1="14" x2="5.5" y2="18.5" class="arrow" stroke-width="1.1" stroke-linecap="round"/>
  <polyline points="7,19 5.5,18.5 6,17"     fill="none" class="arrow" stroke-width="1.1" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- bottom-right -->
  <line x1="14" y1="14" x2="18.5" y2="18.5" class="arrow" stroke-width="1.1" stroke-linecap="round"/>
  <polyline points="17,19 18.5,18.5 18,17"   fill="none" class="arrow" stroke-width="1.1" stroke-linecap="round" stroke-linejoin="round"/>
</svg>
