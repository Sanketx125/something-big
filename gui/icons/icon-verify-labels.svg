<svg width="24" height="24" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
  <style>
    /* Verified label row */
    .lbl-ok-fill   { fill: #EAF3DE; }
    .lbl-ok-line   { stroke: #639922; }
    .lbl-ok-text   { stroke: #639922; }
    /* Unverified label row */
    .lbl-warn-fill { fill: #FAEEDA; }
    .lbl-warn-line { stroke: #BA7517; }
    .lbl-warn-text { stroke: #BA7517; }
    /* Check badge */
    .badge-ok      { fill: #639922; }
    /* Question badge */
    .badge-warn    { fill: #BA7517; }
    /* Class color dots */
    .dot-ground    { fill: #BA7517; }
    .dot-build     { fill: #D85A30; }
    .dot-water     { fill: #185FA5; }

    @media (prefers-color-scheme: dark) {
      .lbl-ok-fill   { fill: #173404; }
      .lbl-ok-line   { stroke: #97C459; }
      .lbl-ok-text   { stroke: #97C459; }
      .lbl-warn-fill { fill: #412402; }
      .lbl-warn-line { stroke: #EF9F27; }
      .lbl-warn-text { stroke: #EF9F27; }
      .badge-ok      { fill: #3B6D11; }
      .badge-warn    { fill: #854F0B; }
      .dot-ground    { fill: #EF9F27; }
      .dot-build     { fill: #F0997B; }
      .dot-water     { fill: #85B7EB; }
    }
  </style>

  <!-- Label row 1 — verified -->
  <rect x="2" y="3" width="14" height="4.5" rx="1.2"
        class="lbl-ok-fill lbl-ok-line" stroke-width="0.85"/>
  <circle cx="5" cy="5.25" r="1" class="dot-ground"/>
  <line x1="7.5" y1="5.25" x2="13" y2="5.25"
        class="lbl-ok-text" stroke-width="0.7" stroke-linecap="round" opacity="0.6"/>
  <circle cx="18.5" cy="5.25" r="3" class="badge-ok"/>
  <polyline points="16.8,5.25 18,6.5 20.2,3.8"
            fill="none" stroke="white" stroke-width="1.1"
            stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Label row 2 — verified -->
  <rect x="2" y="9.75" width="14" height="4.5" rx="1.2"
        class="lbl-ok-fill lbl-ok-line" stroke-width="0.85"/>
  <circle cx="5" cy="12" r="1" class="dot-build"/>
  <line x1="7.5" y1="12" x2="13" y2="12"
        class="lbl-ok-text" stroke-width="0.7" stroke-linecap="round" opacity="0.6"/>
  <circle cx="18.5" cy="12" r="3" class="badge-ok"/>
  <polyline points="16.8,12 18,13.25 20.2,10.55"
            fill="none" stroke="white" stroke-width="1.1"
            stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Label row 3 — unverified -->
  <rect x="2" y="16.5" width="14" height="4.5" rx="1.2"
        class="lbl-warn-fill lbl-warn-line" stroke-width="0.85"/>
  <circle cx="5" cy="18.75" r="1" class="dot-water"/>
  <line x1="7.5" y1="18.75" x2="13" y2="18.75"
        class="lbl-warn-text" stroke-width="0.7" stroke-linecap="round" opacity="0.6"/>
  <circle cx="18.5" cy="18.75" r="3" class="badge-warn"/>
  <text x="18.5" y="18.75"
        text-anchor="middle" dominant-baseline="central"
        font-family="system-ui, -apple-system, sans-serif"
        font-size="4" font-weight="700" fill="white">?</text>
</svg>
