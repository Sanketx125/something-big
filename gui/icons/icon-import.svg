<svg width="24" height="24" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
  <style>
    .tray-fill   { fill: #E6F1FB; }
    .tray-stroke { stroke: #185FA5; }
    .arrow       { stroke: #185FA5; }

    @media (prefers-color-scheme: dark) {
      .tray-fill   { fill: #0C447C; }
      .tray-stroke { stroke: #378ADD; }
      .arrow       { stroke: #85B7EB; }
    }
  </style>

  <!-- Tray base -->
  <rect x="3" y="14" width="18" height="7" rx="2"
        class="tray-fill tray-stroke" stroke-width="1"/>

  <!-- Arrow shaft pointing down -->
  <line x1="12" y1="3" x2="12" y2="13"
        class="arrow" stroke-width="1.6" stroke-linecap="round"/>

  <!-- Arrow head pointing down (into tray) -->
  <polyline points="8,10 12,14 16,10"
            fill="none" class="arrow"
            stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>
</svg>
