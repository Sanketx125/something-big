  <line x1="9" y1="19" x2="8" y2="21" stroke="currentColor" stroke-width="0.95" stroke-linecap="round" stroke-opacity="0.45"/>
  <line x1="13" y1="19" x2="12" y2="21" stroke="currentColor" stroke-width="0.95" stroke-linecap="round" stroke-opacity="0.45"/>
  <line x1="17" y1="19" x2="16" y2="21" stroke="currentColor" stroke-width="0.95" stroke-linecap="round" stroke-opacity="0.45"/>
