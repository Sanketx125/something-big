<svg width="24" height="24" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Non-ground points above the baseline -->
  <circle cx="6" cy="7" r="0.85" fill="currentColor" fill-opacity="0.18"/>
  <circle cx="10" cy="5" r="0.85" fill="currentColor" fill-opacity="0.18"/>
  <circle cx="14" cy="7" r="0.85" fill="currentColor" fill-opacity="0.18"/>
  <circle cx="18" cy="5" r="0.85" fill="currentColor" fill-opacity="0.18"/>
  <circle cx="8" cy="10" r="0.85" fill="currentColor" fill-opacity="0.18"/>
  <circle cx="16" cy="10" r="0.85" fill="currentColor" fill-opacity="0.18"/>

  <!-- Ground band -->
  <circle cx="4" cy="16" r="0.95" fill="currentColor" fill-opacity="0.9"/>
  <circle cx="7" cy="17" r="0.95" fill="currentColor" fill-opacity="0.9"/>
  <circle cx="10" cy="16" r="0.95" fill="currentColor" fill-opacity="0.9"/>
  <circle cx="13" cy="17" r="0.95" fill="currentColor" fill-opacity="0.9"/>
