<svg width="24" height="24" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
  <style>
    .vp-fill   { fill: #E6F1FB; }
    .vp-line   { stroke: #185FA5; }
    .cloud     { fill: #185FA5; }
    .sync-arc  { stroke: #1D9E75; }
    .sync-dash { stroke: #1D9E75; }

    @media (prefers-color-scheme: dark) {
      .vp-fill   { fill: #0C447C; }
      .vp-line   { stroke: #378ADD; }
      .cloud     { fill: #85B7EB; }
      .sync-arc  { stroke: #5DCAA5; }
      .sync-dash { stroke: #5DCAA5; }
    }
  </style>

  <!-- Four viewports — 2×2 grid -->
  <rect x="2"  y="2"  width="9" height="8" rx="1.5" class="vp-fill vp-line" stroke-width="0.9"/>
  <rect x="13" y="2"  width="9" height="8" rx="1.5" class="vp-fill vp-line" stroke-width="0.9"/>
  <rect x="2"  y="14" width="9" height="8" rx="1.5" class="vp-fill vp-line" stroke-width="0.9"/>
  <rect x="13" y="14" width="9" height="8" rx="1.5" class="vp-fill vp-line" stroke-width="0.9"/>

  <!-- Point cloud dots in each viewport -->
  <circle cx="5"    cy="5.5" r="0.7" class="cloud" opacity="0.55"/>
  <circle cx="7"    cy="4.5" r="0.7" class="cloud" opacity="0.65"/>
  <circle cx="8.5"  cy="6"   r="0.7" class="cloud" opacity="0.55"/>
  <circle cx="16"   cy="5.5" r="0.7" class="cloud" opacity="0.55"/>
  <circle cx="18"   cy="4.5" r="0.7" class="cloud" opacity="0.65"/>
  <circle cx="19.5" cy="6"   r="0.7" class="cloud" opacity="0.55"/>
  <circle cx="5"    cy="17.5" r="0.7" class="cloud" opacity="0.55"/>
  <circle cx="7"    cy="16.5" r="0.7" class="cloud" opacity="0.65"/>
  <circle cx="8.5"  cy="18"   r="0.7" class="cloud" opacity="0.55"/>
  <circle cx="16"   cy="17.5" r="0.7" class="cloud" opacity="0.55"/>
  <circle cx="18"   cy="16.5" r="0.7" class="cloud" opacity="0.65"/>
  <circle cx="19.5" cy="18"   r="0.7" class="cloud" opacity="0.55"/>

  <!-- Sync arc top — left to right -->
  <path d="M9.5 6 Q12 4 14.5 6"
        fill="none" class="sync-arc"
        stroke-width="1.2" stroke-linecap="round"/>
  <polyline points="13,4.5 14.5,6 13,7.5"
            fill="none" class="sync-arc"
            stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Sync arc bottom — right to left -->
  <path d="M14.5 18 Q12 20 9.5 18"
        fill="none" class="sync-arc"
        stroke-width="1.2" stroke-linecap="round"/>
  <polyline points="11,16.5 9.5,18 11,19.5"
            fill="none" class="sync-arc"
            stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Dashed vertical connectors left + right -->
  <line x1="6.5"  y1="10" x2="6.5"  y2="14"
        class="sync-dash" stroke-width="1.2"
        stroke-linecap="round" stroke-dasharray="1.5 1"/>
  <line x1="17.5" y1="10" x2="17.5" y2="14"
        class="sync-dash" stroke-width="1.2"
        stroke-linecap="round" stroke-dasharray="1.5 1"/>
</svg>
