<svg width="24" height="24" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
  <style>
    .cloud-out { fill: #185FA5; }
    .cloud-in  { fill: #185FA5; }
    .fence     { stroke: #EF9F27; fill: #EF9F27; }
    @media (prefers-color-scheme: dark) {
      .cloud-out { fill: #0C447C; }
      .cloud-in  { fill: #85B7EB; }
      .fence     { stroke: #FAC775; fill: #FAC775; }
    }
  </style>
  <circle cx="4"  cy="6"  r="0.8" class="cloud-out" opacity="0.35"/>
  <circle cx="20" cy="6"  r="0.8" class="cloud-out" opacity="0.35"/>
  <circle cx="4"  cy="18" r="0.8" class="cloud-out" opacity="0.35"/>
  <circle cx="20" cy="18" r="0.8" class="cloud-out" opacity="0.35"/>
  <circle cx="9"  cy="9"  r="0.8" class="cloud-in" opacity="0.7"/>
  <circle cx="13" cy="8"  r="0.8" class="cloud-in" opacity="0.7"/>
  <circle cx="16" cy="11" r="0.8" class="cloud-in" opacity="0.7"/>
  <circle cx="10" cy="14" r="0.8" class="cloud-in" opacity="0.7"/>
  <circle cx="15" cy="15" r="0.8" class="cloud-in" opacity="0.7"/>
  <polyline points="7,5 17,4 20,12 15,19 6,18 4,10 7,5"
            fill="#EF9F27" fill-opacity="0.08" class="fence"
            stroke-width="1.2" stroke-dasharray="2 1.5"
            stroke-linecap="round" stroke-linejoin="round"/>
  <circle cx="7"  cy="5"  r="1" class="fence" stroke-width="0"/>
  <circle cx="17" cy="4"  r="1" class="fence" stroke-width="0"/>
  <circle cx="20" cy="12" r="1" class="fence" stroke-width="0"/>
  <circle cx="15" cy="19" r="1" class="fence" stroke-width="0"/>
  <circle cx="6"  cy="18" r="1" class="fence" stroke-width="0"/>
  <circle cx="4"  cy="10" r="1" class="fence" stroke-width="0"/>
</svg>
