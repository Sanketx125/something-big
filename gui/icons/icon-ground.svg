<svg width="24" height="24" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
  <style>
    .cloud-up  { fill: #185FA5; }
    .gnd-dot   { fill: #BA7517; }
    .gnd-line  { stroke: #BA7517; }
    @media (prefers-color-scheme: dark) {
      .cloud-up  { fill: #0C447C; }
      .gnd-dot   { fill: #EF9F27; }
      .gnd-line  { stroke: #EF9F27; }
    }
  </style>
  <!-- non-ground points — muted above -->
  <circle cx="6"  cy="7"  r="0.85" class="cloud-up" opacity="0.4"/>
  <circle cx="10" cy="5"  r="0.85" class="cloud-up" opacity="0.4"/>
  <circle cx="14" cy="7"  r="0.85" class="cloud-up" opacity="0.4"/>
  <circle cx="18" cy="5"  r="0.85" class="cloud-up" opacity="0.4"/>
  <circle cx="8"  cy="10" r="0.85" class="cloud-up" opacity="0.4"/>
  <circle cx="16" cy="10" r="0.85" class="cloud-up" opacity="0.4"/>
  <!-- ground points — flat band near baseline -->
  <circle cx="4"  cy="16" r="0.9" class="gnd-dot" opacity="0.9"/>
  <circle cx="7"  cy="17" r="0.9" class="gnd-dot" opacity="0.9"/>
  <circle cx="10" cy="16" r="0.9" class="gnd-dot" opacity="0.9"/>
  <circle cx="13" cy="17" r="0.9" class="gnd-dot" opacity="0.9"/>
  <circle cx="16" cy="16" r="0.9" class="gnd-dot" opacity="0.9"/>
  <circle cx="19" cy="17" r="0.9" class="gnd-dot" opacity="0.9"/>
  <!-- ground baseline -->
  <line x1="3" y1="19" x2="21" y2="19" class="gnd-line" stroke-width="1.3" stroke-linecap="round"/>
  <!-- hatching beneath baseline -->
  <line x1="5"  y1="19" x2="4"  y2="21" class="gnd-line" stroke-width="0.9" stroke-linecap="round" opacity="0.5"/>
  <line x1="9"  y1="19" x2="8"  y2="21" class="gnd-line" stroke-width="0.9" stroke-linecap="round" opacity="0.5"/>
  <line x1="13" y1="19" x2="12" y2="21" class="gnd-line" stroke-width="0.9" stroke-linecap="round" opacity="0.5"/>
  <line x1="17" y1="19" x2="16" y2="21" class="gnd-line" stroke-width="0.9" stroke-linecap="round" opacity="0.5"/>
</svg>
