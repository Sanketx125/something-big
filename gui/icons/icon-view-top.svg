<svg width="24" height="24" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
  <style>
    .front-face { fill: #B5D4F4; stroke: #185FA5; opacity: 0.45; }
    .right-face { fill: #85B7EB; stroke: #185FA5; opacity: 0.40; }
    .top-fill   { fill: #E6F1FB; }
    .top-line   { stroke: #185FA5; }
    .grid-line  { stroke: #185FA5; }
    .eye-ring   { stroke: #185FA5; }
    .eye-dot    { fill: #185FA5; }

    @media (prefers-color-scheme: dark) {
      .front-face { fill: #0C447C; stroke: #378ADD; opacity: 0.5; }
      .right-face { fill: #042C53; stroke: #378ADD; opacity: 0.6; }
      .top-fill   { fill: #185FA5; }
      .top-line   { stroke: #85B7EB; }
      .grid-line  { stroke: #B5D4F4; }
      .eye-ring   { stroke: #85B7EB; }
      .eye-dot    { fill: #85B7EB; }
    }
  </style>

  <!-- Front face — muted -->
  <rect x="4" y="8" width="12" height="12"
        class="front-face" stroke-width="0.9"/>

  <!-- Right face — muted -->
  <polygon points="16,8 20,4 20,16 16,20"
           class="right-face" stroke-width="0.8" stroke-linejoin="round"/>

  <!-- Top face — HIGHLIGHTED -->
  <polygon points="4,8 8,4 20,4 16,8"
           class="top-fill top-line" stroke-width="1.1" stroke-linejoin="round"/>

  <!-- Subtle grid on top face -->
  <line x1="8"  y1="4" x2="12" y2="8" class="grid-line" stroke-width="0.6" stroke-linecap="round" opacity="0.3"/>
  <line x1="6"  y1="4" x2="10" y2="8" class="grid-line" stroke-width="0.6" stroke-linecap="round" opacity="0.3"/>
  <line x1="12" y1="4" x2="8"  y2="8" class="grid-line" stroke-width="0.6" stroke-linecap="round" opacity="0.3"/>
  <line x1="6"  y1="6" x2="18" y2="6" class="grid-line" stroke-width="0.6" stroke-linecap="round" opacity="0.25"/>

  <!-- Ortho eye — bottom center (looking down from above) -->
  <circle cx="12" cy="22" r="2"
          fill="none" class="eye-ring" stroke-width="0.9" opacity="0.75"/>
  <circle cx="12" cy="22" r="0.7"
          class="eye-dot" opacity="0.75"/>
</svg>
