<svg width="64" height="72" viewBox="0 0 40 46" fill="none" xmlns="http://www.w3.org/2000/svg">
  <style>
    .doc  { fill:#FFFFFF; stroke:#E0D0B8; }
    .fold { fill:#F5EDD8; stroke:#E0D0B8; }
    .geo1 { stroke:#EF9F27; }
    .geo2 { stroke:#BA7517; }
    .dot  { fill:#EF9F27; }
    .band { fill:#BA7517; }
    .txt  { fill:#FFFFFF; }
    @media(prefers-color-scheme:dark){
      .doc  { fill:#1E1A0E; stroke:#3A2E10; }
      .fold { fill:#28230E; stroke:#3A2E10; }
      .geo1 { stroke:#FAC775; }
      .geo2 { stroke:#EF9F27; }
      .dot  { fill:#FAC775; }
      .band { fill:#EF9F27; }
      .txt  { fill:#2C1A00; }
    }
  </style>
  <rect x="1.5" y="1.5" width="37" height="43" rx="4" class="doc" stroke-width="1"/>
  <path d="M27 1.5 L38.5 13 H28a1 1 0 0 1-1-1Z" class="fold" stroke-width=".8"/>
  <!-- CAD geometry: rectangle + diagonal + arc -->
  <rect x="6" y="8" width="13" height="9" fill="none" class="geo1" stroke-width=".9" opacity=".50"/>
  <line x1="6" y1="8" x2="19" y2="17" class="geo1" stroke-width=".8" opacity=".40"/>
  <path d="M21 11 Q25 7 28 14" fill="none" class="geo2" stroke-width=".9" opacity=".45"/>
  <circle cx="6"  cy="8"  r=".9" class="dot" opacity=".50"/>
  <circle cx="19" cy="17" r=".9" class="dot" opacity=".45"/>
  <!-- Dimension ticks -->
  <line x1="6"  y1="20" x2="6"  y2="23" class="geo2" stroke-width=".8" opacity=".30"/>
  <line x1="19" y1="20" x2="19" y2="23" class="geo2" stroke-width=".8" opacity=".30"/>
  <line x1="6"  y1="22" x2="19" y2="22" class="geo2" stroke-width=".7" opacity=".28"/>
  <!-- Bold color band bottom -->
  <path d="M1.5 29H38.5V42a3.5 3.5 0 0 1-3.5 3.5H5A3.5 3.5 0 0 1 1.5 42Z" class="band"/>
  <text x="20" y="38.5" text-anchor="middle" dominant-baseline="central"
        font-family="Arial Black,Arial,Helvetica,sans-serif"
        font-size="11.5" font-weight="900" class="txt" letter-spacing="1.2">DXF</text>
</svg>
