<svg width="24" height="24" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
  <style>
    /* Points behind the cut plane — muted */
    .cloud-back  { fill: #B5D4F4; }
    /* Points in front of cut plane — full color */
    .cloud-front { fill: #185FA5; }
    /* Cut plane line + arrows */
    .cut-plane   { stroke: #EF9F27; }
    /* Intersection dots on the cut plane */
    .slice-dot   { fill: #EF9F27; }

    @media (prefers-color-scheme: dark) {
      .cloud-back  { fill: #0C447C; }
      .cloud-front { fill: #85B7EB; }
      .cut-plane   { stroke: #FAC775; }
      .slice-dot   { fill: #FAC775; }
    }
  </style>

  <!-- Point cloud — behind cut (left, muted) -->
  <circle cx="4"   cy="6"  r="0.85" class="cloud-back" opacity="0.55"/>
  <circle cx="5.5" cy="10" r="0.85" class="cloud-back" opacity="0.55"/>
  <circle cx="4"   cy="14" r="0.85" class="cloud-back" opacity="0.55"/>
  <circle cx="6"   cy="18" r="0.85" class="cloud-back" opacity="0.50"/>
  <circle cx="7.5" cy="7"  r="0.85" class="cloud-back" opacity="0.50"/>
  <circle cx="7"   cy="13" r="0.85" class="cloud-back" opacity="0.50"/>
  <circle cx="8"   cy="17" r="0.85" class="cloud-back" opacity="0.55"/>
  <circle cx="9"   cy="5"  r="0.85" class="cloud-back" opacity="0.45"/>
  <circle cx="9.5" cy="11" r="0.85" class="cloud-back" opacity="0.50"/>

  <!-- Cut plane — vertical dashed line -->
  <line x1="12" y1="2" x2="12" y2="22"
        class="cut-plane" stroke-width="1.4"
        stroke-dasharray="2 1.5" stroke-linecap="round"/>

  <!-- Cut plane direction arrows top + bottom -->
  <polyline points="10,4 12,2 14,4"
            fill="none" class="cut-plane"
            stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"/>
  <polyline points="10,20 12,22 14,20"
            fill="none" class="cut-plane"
            stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Point cloud — in front of cut (right, full color) -->
  <circle cx="14"   cy="6"  r="0.85" class="cloud-front" opacity="0.90"/>
  <circle cx="15.5" cy="10" r="0.85" class="cloud-front" opacity="0.90"/>
  <circle cx="14"   cy="14" r="0.85" class="cloud-front" opacity="0.90"/>
  <circle cx="16"   cy="18" r="0.85" class="cloud-front" opacity="0.90"/>
  <circle cx="17"   cy="7"  r="0.85" class="cloud-front" opacity="0.85"/>
  <circle cx="17"   cy="13" r="0.85" class="cloud-front" opacity="0.85"/>
  <circle cx="18"   cy="17" r="0.85" class="cloud-front" opacity="0.90"/>
  <circle cx="19"   cy="5"  r="0.85" class="cloud-front" opacity="0.80"/>
  <circle cx="19.5" cy="11" r="0.85" class="cloud-front" opacity="0.85"/>

  <!-- Intersection dots — highlighted points ON the cut plane -->
  <circle cx="12" cy="6"  r="1.1" class="slice-dot"/>
  <circle cx="12" cy="10" r="1.1" class="slice-dot"/>
  <circle cx="12" cy="14" r="1.1" class="slice-dot"/>
  <circle cx="12" cy="18" r="1.1" class="slice-dot"/>
</svg>
