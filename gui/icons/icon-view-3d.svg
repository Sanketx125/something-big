<svg width="24" height="24" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
  <style>
    /* Light mode — three-tone shading, top brightest */
    .top-face   { fill: #E6F1FB; stroke: #185FA5; }
    .right-face { fill: #85B7EB; stroke: #185FA5; }
    .front-face { fill: #B5D4F4; stroke: #185FA5; }
    .grid-line  { stroke: #185FA5; }
    .eye-ring   { stroke: #185FA5; }
    .eye-dot    { fill: #185FA5; }

    @media (prefers-color-scheme: dark) {
      .top-face   { fill: #378ADD; stroke: #85B7EB; }
      .right-face { fill: #0C447C; stroke: #378ADD; }
      .front-face { fill: #185FA5; stroke: #378ADD; }
      .grid-line  { stroke: #B5D4F4; }
      .eye-ring   { stroke: #85B7EB; }
      .eye-dot    { fill: #85B7EB; }
    }
  </style>

  <!-- Top face — brightest (light source above) -->
  <polygon points="4,8 8,4 20,4 16,8"
           class="top-face" stroke-width="1" stroke-linejoin="round"/>

  <!-- Right face — medium shade -->
  <polygon points="16,8 20,4 20,16 16,20"
           class="right-face" stroke-width="1" stroke-linejoin="round"/>

  <!-- Front face — deepest shade -->
  <rect x="4" y="8" width="12" height="12"
        class="front-face" stroke-width="1"/>

  <!-- Grid lines — front face -->
  <line x1="10" y1="8"  x2="10" y2="20" class="grid-line" stroke-width="0.5" stroke-linecap="round" opacity="0.25"/>
  <line x1="4"  y1="14" x2="16" y2="14" class="grid-line" stroke-width="0.5" stroke-linecap="round" opacity="0.25"/>

  <!-- Grid lines — right face -->
  <line x1="18" y1="8"  x2="18" y2="20" class="grid-line" stroke-width="0.5" stroke-linecap="round" opacity="0.2"/>
  <line x1="16" y1="14" x2="20" y2="10" class="grid-line" stroke-width="0.5" stroke-linecap="round" opacity="0.2"/>

  <!-- Ortho eye — top-right corner (isometric viewpoint) -->
  <circle cx="22" cy="3" r="1.8"
          fill="none" class="eye-ring" stroke-width="0.9" opacity="0.75"/>
  <circle cx="22" cy="3" r="0.65"
          class="eye-dot" opacity="0.75"/>
</svg>
