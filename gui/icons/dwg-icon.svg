<svg width="64" height="72" viewBox="0 0 40 46" fill="none" xmlns="http://www.w3.org/2000/svg">
  <style>
    .doc  { fill:#FFFFFF; stroke:#DBC8C8; }
    .fold { fill:#F5E8E8; stroke:#DBC8C8; }
    .wal1 { stroke:#D85A30; }
    .wal2 { stroke:#993C1D; }
    .dot  { fill:#D85A30; }
    .band { fill:#993C1D; }
    .txt  { fill:#FFFFFF; }
    @media(prefers-color-scheme:dark){
      .doc  { fill:#1C1210; stroke:#3A2018; }
      .fold { fill:#261810; stroke:#3A2018; }
      .wal1 { stroke:#F0997B; }
      .wal2 { stroke:#D85A30; }
      .dot  { fill:#F0997B; }
      .band { fill:#D85A30; }
      .txt  { fill:#FFFFFF; }
    }
  </style>
  <rect x="1.5" y="1.5" width="37" height="43" rx="4" class="doc" stroke-width="1"/>
  <path d="M27 1.5 L38.5 13 H28a1 1 0 0 1-1-1Z" class="fold" stroke-width=".8"/>
  <!-- Floor plan: outer walls -->
  <rect x="5" y="7" width="22" height="17" fill="none" class="wal1" stroke-width=".9" opacity=".45"/>
  <!-- Room dividers -->
  <line x1="14" y1="7"  x2="14" y2="19" class="wal1" stroke-width=".8" opacity=".40"/>
  <line x1="5"  y1="14" x2="14" y2="14" class="wal1" stroke-width=".8" opacity=".40"/>
  <!-- Door gap + swing arc -->
  <line x1="5"  y1="24" x2="9"  y2="24" class="wal1" stroke-width=".8" opacity=".35"/>
  <line x1="13" y1="24" x2="27" y2="24" class="wal1" stroke-width=".8" opacity=".35"/>
  <path d="M9 24 Q9 19 13 19" fill="none" class="wal2" stroke-width=".75" opacity=".40"/>
  <!-- Corner nodes -->
  <circle cx="5"  cy="7"  r=".9" class="dot" opacity=".45"/>
  <circle cx="27" cy="7"  r=".9" class="dot" opacity=".45"/>
  <circle cx="27" cy="24" r=".9" class="dot" opacity=".45"/>
  <circle cx="5"  cy="24" r=".9" class="dot" opacity=".45"/>
  <!-- Bold color band bottom -->
  <path d="M1.5 29H38.5V42a3.5 3.5 0 0 1-3.5 3.5H5A3.5 3.5 0 0 1 1.5 42Z" class="band"/>
  <text x="20" y="38.5" text-anchor="middle" dominant-baseline="central"
        font-family="Arial Black,Arial,Helvetica,sans-serif"
        font-size="11.5" font-weight="900" class="txt" letter-spacing="1.2">DWG</text>
</svg>
