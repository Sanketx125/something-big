<svg width="24" height="24" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Dashed rectangle (selection zone) -->
  <rect x="2.75" y="2.75" width="13" height="10" rx="1.25" stroke="currentColor" stroke-width="1.4" stroke-dasharray="3.5 2"/>
  <!-- Magnifier circle -->
  <circle cx="13" cy="13.5" r="6" fill="currentColor" fill-opacity="0.08" stroke="currentColor" stroke-width="1.5"/>
  <!-- Magnifier plus (zoom in) -->
  <line x1="13" y1="11" x2="13" y2="16" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/>
  <line x1="10.5" y1="13.5" x2="15.5" y2="13.5" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/>
  <!-- Magnifier handle -->
  <line x1="17.8" y1="17.8" x2="21" y2="21" stroke="currentColor" stroke-width="1.7" stroke-linecap="round"/>
</svg>
