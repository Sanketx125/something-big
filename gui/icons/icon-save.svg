<svg width="24" height="24" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
  <style>
    .disk-fill  { fill: #E6F1FB; }
    .disk-line  { stroke: #185FA5; }
    .label-fill { fill: #185FA5; }
    .slot-line  { stroke: #185FA5; }

    @media (prefers-color-scheme: dark) {
      .disk-fill  { fill: #0C447C; }
      .disk-line  { stroke: #378ADD; }
      .label-fill { fill: #85B7EB; }
      .slot-line  { stroke: #85B7EB; }
    }
  </style>

  <!-- Floppy outer body -->
  <rect x="3" y="3" width="18" height="18" rx="2"
        class="disk-fill disk-line" stroke-width="1"/>

  <!-- Label area top -->
  <rect x="6" y="3" width="9" height="6" rx="0"
        class="disk-fill" opacity="0.0"/>
  <rect x="6" y="3" width="9" height="6"
        class="label-fill" opacity="0.15"/>

  <!-- Write notch cut top-right -->
  <path d="M17 3L21 7" class="disk-line" stroke-width="1" stroke-linecap="round"/>

  <!-- Disk slot / storage area bottom -->
  <rect x="7" y="13" width="10" height="6" rx="1"
        fill="none" class="slot-line" stroke-width="0.9" opacity="0.6"/>

  <!-- Label pen mark -->
  <line x1="8" y1="6" x2="12" y2="6"
        class="disk-line" stroke-width="0.9" stroke-linecap="round" opacity="0.5"/>
</svg>
